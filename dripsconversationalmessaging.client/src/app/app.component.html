<div class="app-shell">
  <header class="app-header">
    <span class="app-logo">Drips Messaging</span>
    <nav class="app-nav" aria-label="Main navigation">
      <a routerLink="/ingest" routerLinkActive="active">Ingest Message</a>
      <a routerLink="/priority" routerLinkActive="active">Priority Inbox</a>
    </nav>
    <button
      class="theme-toggle"
      role="switch"
      [attr.aria-checked]="isDark()"
      [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="toggleTheme()">
      <span class="toggle-icon">{{ isDark() ? '🌙' : '☀️' }}</span>
      <span class="toggle-track">
        <span class="toggle-thumb"></span>
      </span>
    </button>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>
</div>
